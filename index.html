<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <meta property="og:title" content="Cyber Catch - Neon Mobile Game">
    <meta property="og:description" content="Uji kecepatan jempolmu! Bisakah kamu mencapai Level God Mode tanpa terkena jebakan?">
    <meta property="og:image" content="https://emojicdn.elk.sh/🎯?style=apple">
    <meta property="og:type" content="website">

    <title>Cyber Catch - Full Edition</title>
    <style>
        :root { --neon: #00f2ff; --pink: #ff007f; --trap: #ff3b30; --bg: #0a0a0c; }
        body { 
            margin: 0; overflow: hidden; background: var(--bg); 
            font-family: 'Segoe UI', Roboto, sans-serif; touch-action: none; color: white;
        }
        #game-container { position: relative; width: 100vw; height: 100vh; }
        
        /* Target Bulat Neon (Biru) */
        #target { 
            position: absolute; width: 70px; height: 70px; 
            background: var(--neon); border-radius: 50%; 
            box-shadow: 0 0 20px var(--neon), 0 0 40px var(--neon);
            display: none; transition: transform 0.1s; z-index: 5;
        }

        /* Jebakan Bulat (Merah) */
        #trap {
            position: absolute; width: 70px; height: 70px;
            background: var(--trap); border-radius: 50%;
            box-shadow: 0 0 20px var(--trap), 0 0 40px var(--trap);
            display: none; z-index: 5;
        }

        /* Efek Partikel */
        .particle {
            position: absolute; width: 6px; height: 6px;
            border-radius: 50%; pointer-events: none; z-index: 4;
        }

        /* UI Styling */
        #ui-layer { 
            position: absolute; top: 40px; width: 100%; text-align: center; 
            z-index: 2; pointer-events: none;
        }
        #score-board { font-size: 50px; font-weight: 900; text-shadow: 0 0 15px var(--neon); }
        #level-indicator { color: var(--pink); font-size: 14px; letter-spacing: 3px; margin-top: 5px; font-weight: bold; }

        /* Overlay Menu */
        #overlay { 
            position: absolute; z-index: 20; background: rgba(10, 10, 12, 0.95); 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; text-align: center; padding: 20px;
        }
        
        #game-logo {
            font-size: 80px; margin-bottom: 10px;
            text-shadow: 0 0 30px var(--neon);
            animation: pulse 2s infinite;
        }

        h1 { font-size: 36px; margin: 0; color: var(--neon); text-shadow: 0 0 20px var(--neon); letter-spacing: 3px; }
        #final-score { color: #888; margin: 20px 0 40px 0; line-height: 1.6; font-size: 16px; }
        
        button { 
            padding: 18px 50px; font-size: 18px; border-radius: 50px; 
            border: 2px solid var(--neon); background: transparent; 
            color: var(--neon); font-weight: bold; box-shadow: 0 0 15px var(--neon);
            cursor: pointer; transition: 0.3s;
        }
        button:active { background: var(--neon); color: #000; transform: scale(0.95); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay">
        <div id="game-logo">🎯</div> 
        <h1 id="status-title">CYBER CATCH</h1>
        <p id="final-score">Misi: Tap lingkaran <span style="color:var(--neon)">BIRU</span>.<br>JANGAN tap lingkaran <span style="color:var(--trap)">MERAH</span>!</p>
        <button onclick="startGame()">START MISSION</button>
    </div>

    <div id="ui-layer">
        <div id="score-board">00</div>
        <div id="level-indicator">LEVEL 1 - RECRUIT</div>
    </div>
    
    <div id="target"></div>
    <div id="trap"></div>
</div>

<script>
    let score = 0;
    let level = 1;
    let gameTimer;
    let audioCtx;
    
    const target = document.getElementById('target');
    const trap = document.getElementById('trap');
    const scoreBoard = document.getElementById('score-board');
    const levelInd = document.getElementById('level-indicator');
    const overlay = document.getElementById('overlay');
    const statusTitle = document.getElementById('status-title');
    const finalScore = document.getElementById('final-score');

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playPop() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(400 + (score * 15), audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.1);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    function playFail() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(120, audioCtx.currentTime);
        osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.4);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.4);
    }

    function startGame() {
        initAudio();
        score = 0;
        level = 1;
        overlay.style.display = 'none';
        target.style.display = 'block';
        moveElements();
    }

    function createParticles(x, y, color) {
        for(let i=0; i<6; i++) {
            const p = document.createElement('div');
            p.className = 'particle';
            p.style.background = color;
            p.style.left = x + 'px';
            p.style.top = y + 'px';
            document.body.appendChild(p);
            const angle = Math.random() * Math.PI * 2;
            const vel = 3 + Math.random() * 5;
            const dx = Math.cos(angle) * vel;
            const dy = Math.sin(angle) * vel;
            let op = 1;
            const anim = setInterval(() => {
                p.style.left = (parseFloat(p.style.left) + dx) + 'px';
                p.style.top = (parseFloat(p.style.top) + dy) + 'px';
                op -= 0.05; p.style.opacity = op;
                if(op <= 0) { clearInterval(anim); p.remove(); }
            }, 20);
        }
    }

    function moveElements() {
        clearTimeout(gameTimer);
        level = Math.floor(score / 10) + 1;
        
        let speed = Math.max(650, 1300 - (score * 15));
        gameTimer = setTimeout(() => gameOver("WAKTU HABIS!"), speed);

        const maxX = window.innerWidth - 80;
        const maxY = window.innerHeight - 150;

        const targetX = Math.floor(Math.random() * maxX);
        const targetY = Math.floor(Math.random() * (maxY - 150) + 150);
        target.style.left = targetX + 'px';
        target.style.top = targetY + 'px';

        if (Math.random() < 0.35 + (level * 0.05)) { 
            let trapX, trapY;
            do {
                trapX = Math.floor(Math.random() * maxX);
                trapY = Math.floor(Math.random() * (maxY - 150) + 150);
            } while (Math.abs(trapX - targetX) < 90 && Math.abs(trapY - targetY) < 90);
            
            trap.style.left = trapX + 'px';
            trap.style.top = trapY + 'px';
            trap.style.display = 'block';
        } else {
            trap.style.display = 'none';
        }
        updateUI();
    }

    function updateUI() {
        scoreBoard.innerHTML = score < 10 ? "0" + score : score;
        const ranks = ["RECRUIT", "AGENT", "ELITE", "CYBER GHOST", "GOD MODE"];
        levelInd.innerHTML = `LEVEL ${level} - ${ranks[Math.min(level-1, 4)]}`;
    }

    target.addEventListener('touchstart', function(e) {
        e.preventDefault();
        playPop();
        const t = e.touches[0];
        createParticles(t.pageX, t.pageY, 'var(--neon)');
        score++;
        target.style.transform = "scale(0.7)";
        setTimeout(() => target.style.transform = "scale(1)", 50);
        moveElements();
    });

    trap.addEventListener('touchstart', function(e) {
        e.preventDefault();
        const t = e.touches[0];
        createParticles(t.pageX, t.pageY, 'var(--trap)');
        gameOver("JEBAKAN TERINJAK!");
    });

    function gameOver(reason) {
        playFail();
        clearTimeout(gameTimer);
        target.style.display = 'none';
        trap.style.display = 'none';
        overlay.style.display = 'flex';
        statusTitle.innerHTML = "MISSION FAILED";
        statusTitle.style.color = "var(--pink)";
        finalScore.innerHTML = `<span style="color:var(--trap);font-weight:bold">${reason}</span><br>Skor: ${score} | Level: ${level}`;
    }
</script>

</body>
</html>
