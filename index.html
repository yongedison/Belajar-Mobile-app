<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Game Tangkap Kotak - Pro Mode</title>
    <style>
        body { margin: 0; overflow: hidden; background: #1a1a1a; font-family: 'Segoe UI', sans-serif; touch-action: none; color: white; }
        #game-container { position: relative; width: 100vw; height: 100vh; display: flex; align-items: center; justify-content: center; }
        #target { 
            position: absolute; width: 70px; height: 70px; 
            background: #34C759; border-radius: 15px; 
            box-shadow: 0 0 25px rgba(52, 199, 89, 0.5);
            display: none; /* Sembunyi dulu sebelum mulai */
        }
        #ui-layer { position: absolute; top: 30px; width: 100%; text-align: center; pointer-events: none; }
        #score-board { font-size: 32px; font-weight: bold; }
        #message { font-size: 18px; color: #888; margin-top: 10px; }
        #overlay { 
            position: absolute; z-index: 10; background: rgba(0,0,0,0.8); 
            width: 100%; height: 100%; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; 
        }
        button { 
            padding: 15px 40px; font-size: 20px; border-radius: 30px; 
            border: none; background: #007AFF; color: white; font-weight: bold;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div id="overlay">
        <h1 id="status-title">Siap Main?</h1>
        <p id="final-score"></p>
        <button onclick="startGame()">MULAI</button>
    </div>

    <div id="ui-layer">
        <div id="score-board">Skor: 0</div>
        <div id="message">Cepat tap sebelum hilang!</div>
    </div>
    
    <div id="target"></div>
</div>

<script>
    let score = 0;
    let gameTimer;
    const target = document.getElementById('target');
    const scoreBoard = document.getElementById('score-board');
    const overlay = document.getElementById('overlay');
    const statusTitle = document.getElementById('status-title');
    const finalScore = document.getElementById('final-score');

    function startGame() {
        score = 0;
        scoreBoard.innerHTML = "Skor: 0";
        overlay.style.display = 'none';
        target.style.display = 'block';
        moveTarget();
    }

    function moveTarget() {
        // Reset timer: Jika lewat 1200ms (1.2 detik) nggak di-tap, Game Over!
        clearTimeout(gameTimer);
        gameTimer = setTimeout(gameOver, 1200);

        const maxX = window.innerWidth - 80;
        const maxY = window.innerHeight - 150; // Jarak aman dari UI atas
        
        const newX = Math.floor(Math.random() * maxX);
        const newY = Math.floor(Math.random() * (maxY - 100) + 100);

        target.style.left = newX + 'px';
        target.style.top = newY + 'px';
        
        // Animasi kecil biar makin keren
        target.style.transform = "scale(1)";
    }

    target.addEventListener('touchstart', function(e) {
        e.preventDefault();
        score++;
        scoreBoard.innerHTML = "Skor: " + score;
        
        // Efek visual saat ditekan
        target.style.transform = "scale(0.8)";
        
        // Makin tinggi skor, makin cepat waktunya (maksimal 600ms)
        let speed = Math.max(600, 1200 - (score * 20));
        
        moveTarget();
    });

    function gameOver() {
        clearTimeout(gameTimer);
        target.style.display = 'none';
        overlay.style.display = 'flex';
        statusTitle.innerHTML = "GAME OVER!";
        finalScore.innerHTML = "Skor Akhir Kamu: " + score;
    }
</script>

</body>
</html>
